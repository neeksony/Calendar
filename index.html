<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Расписание храма</title>
<style>
  body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 20px; }
  h1 { text-align: center; }
  .event { padding: 10px; margin: 5px 0; border-bottom: 1px solid #ddd; }
  .bold { font-weight: bold; color: #d32f2f; }
</style>
</head>
<body>
<h1>Расписание храма на неделю</h1>
<div id="schedule">Загрузка...</div>

<script>
// ==== НАЧАЛО НАСТРОЙКИ ====
// Вставьте сюда URL вашего Apps Script
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz4zvUgduC9b4WNbJrI-F-SMw9NcqfLOVsvQA1_PptNAltbnVxdsHiC6nePRN6dbMy1Mg/exec";

// Вставьте название вашего престольного праздника (если хотите выделять)
const PRESTOL_PRAZDNIK = "Престольный праздник";

// Список дней недели на русском
const DAY_NAMES = ["ВОСКРЕСЕНЬЕ","ПОНЕДЕЛЬНИК","ВТОРНИК","СРЕДА","ЧЕТВЕРГ","ПЯТНИЦА","СУББОТА"];
// ==== КОНЕЦ НАСТРОЙКИ ====

function isBoldEvent(title, date) {
    const day = DAY_NAMES[date.getDay()];
    return day === "ВОСКРЕСЕНЬЕ" || title.includes(PRESTOL_PRAZDNIK);
}

fetch(SCRIPT_URL)
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("schedule");
    container.innerHTML = "";

    const now = new Date();

    // Сортируем события по дате
    data.sort((a,b) => new Date(a.start) - new Date(b.start));

    data.forEach(ev => {
      const start = new Date(ev.start);
      const end = new Date(ev.end);

      // Показываем только будущие события
      if (start < now) return;

      const bold = isBoldEvent(ev.title, start);
      const dayName = DAY_NAMES[start.getDay()];
      const time = start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) +
                   " - " + end.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

      const div = document.createElement("div");
      div.className = "event";
      div.innerHTML = `${bold ? '<span class="bold">' : ''}${dayName}, ${time}: ${ev.title}${bold ? '</span>' : ''}`;
      container.appendChild(div);
    });

    if (!container.innerHTML) container.innerHTML = "<p>На ближайшие 7 дней событий нет.</p>";
  })
  .catch(err => {
    console.error("Ошибка загрузки событий:", err);
    document.getElementById("schedule").innerHTML = "<p>Не удалось загрузить события.</p>";
  });
</script>
</body>
</html>
