<script>
const calendarId = "ВАШ_CALENDAR_ID"; // p5itre4asi1fmsnu50q7051va0@group.calendar.google.com
const apiKey = "ВАШ_API_KEY"; // AIzaSyAXZGXLGnX7jIYGrBu2sz2YIlSQ33Qafhw

fetch(`https://www.googleapis.com/calendar/v3/calendars/${calendarId}/events?key=${apiKey}&timeMin=${new Date().toISOString()}&maxResults=20&orderBy=startTime&singleEvents=true`)
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("schedule");
    container.innerHTML = ""; // очищаем старый контент
    const dayNames = ["ВОСКРЕСЕНЬЕ","ПОНЕДЕЛЬНИК","ВТОРНИК","СРЕДА","ЧЕТВЕРГ","ПЯТНИЦА","СУББОТА"];
    
    data.items.forEach(ev => {
      const start = new Date(ev.start.dateTime || ev.start.date);
      const day = dayNames[start.getDay()];
      const time = ev.start.dateTime ? start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
      const bold = day === "ВОСКРЕСЕНЬЕ" || ev.summary.toLowerCase().includes("престольный");
      const div = document.createElement("div");
      div.className = "day";
      div.innerHTML = `${bold ? '<span class="bold">' : ''}${day} <br> ${time} — ${ev.summary}${bold ? '</span>' : ''}`;
      container.appendChild(div);
    });
  })
  .catch(err => {
    console.error("Ошибка при загрузке событий:", err);
    document.getElementById("schedule").innerHTML = "<p>Не удалось загрузить события.</p>";
  });
</script>
